version: 2

updates:
  # SDK (npm)
  - package-ecosystem: npm
    directory: /sdk-typescript
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - sdk
    commit-message:
      prefix: deps(sdk)

  # Subgraph (npm)
  - package-ecosystem: npm
    directory: /subgraph
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - subgraph
    commit-message:
      prefix: deps(subgraph)

  # Agent runtime (pip)
  - package-ecosystem: pip
    directory: /agent-runtime
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - agent-runtime
    commit-message:
      prefix: deps(runtime)

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: deps(ci)
