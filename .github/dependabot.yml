version: 2

# Grouping batches routine (minor + patch) bumps into ONE pull request per
# ecosystem, so the repo gets a handful of tidy PRs instead of a swarm of
# single-dependency ones. Major-version bumps still arrive as individual PRs
# because they can carry breaking changes and deserve a closer look.

updates:
  # SDK (npm)
  - package-ecosystem: npm
    directory: /sdk-typescript
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - sdk
    commit-message:
      prefix: deps(sdk)
    groups:
      sdk-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Subgraph (npm)
  - package-ecosystem: npm
    directory: /subgraph
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - subgraph
    commit-message:
      prefix: deps(subgraph)
    groups:
      subgraph-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Agent runtime (pip)
  - package-ecosystem: pip
    directory: /agent-runtime
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - agent-runtime
    commit-message:
      prefix: deps(runtime)
    groups:
      runtime-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: deps(ci)
    groups:
      ci-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
          - major
