name: Subgraph CI

on:
  push:
    branches: [main]
    paths:
      - 'subgraph/**'
      - '.github/workflows/subgraph.yml'
  pull_request:
    paths:
      - 'subgraph/**'
      - '.github/workflows/subgraph.yml'

jobs:
  build:
    name: Build subgraph (codegen + compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: subgraph
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci || npm install

      - name: Codegen
        # Will fail if contracts haven't been forge-built first. Tolerate in CI for now;
        # full build happens in a release pipeline that depends on contracts.
        run: npm run codegen
        continue-on-error: true

      - name: Build
        run: npm run build
        continue-on-error: true

      - name: Verify manifest validity
        run: |
          test -f subgraph.yaml
          test -f schema.graphql
          test -f networks.json
          # YAML quick-validate
          python3 -c "import yaml,sys; yaml.safe_load(open('subgraph.yaml')); print('subgraph.yaml: ok')"
          # GraphQL existence-only check; schema validity requires graph-cli to compile
          test -s schema.graphql
