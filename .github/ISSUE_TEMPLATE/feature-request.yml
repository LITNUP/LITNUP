name: ✨ Feature Request
description: Suggest a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user/operator pain or missing capability.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: How would you solve it? Sketch as much detail as you have.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they're worse.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Smart contracts
        - Agent runtime
        - Frontend
        - Tokenomics / governance
        - Docs / DX
    validations:
      required: true
